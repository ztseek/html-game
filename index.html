<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5互动小游戏集合</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🎮 HTML5互动小游戏集合</h1>
        <p>选择你喜欢的游戏开始玩耍吧！</p>
    </header>

    <main class="games-grid">
        <div class="game-card" onclick="location.href='games/snake.html'">
            <div class="game-icon">🐍</div>
            <h3>贪吃蛇</h3>
            <p>经典贪吃蛇游戏，看你能吃多长！</p>
            <div class="play-btn">开始游戏</div>

        </div>

        <div class="game-card" onclick="location.href='games/memory.html'">
            <div class="game-icon">🎴</div>
            <h3>记忆翻牌</h3>
            <p>考验记忆力的翻牌游戏</p>
            <div class="play-btn">开始游戏</div>
        </div>

        <div class="game-card" onclick="location.href='games/puzzle.html'">
            <div class="game-icon">🧩</div>
            <h3>数字拼图</h3>
            <p>滑动拼图，挑战你的逻辑思维</p>
            <div class="play-btn">开始游戏</div>
        </div>

        <div class="game-card" onclick="location.href='games/quiz.html'">
            <div class="game-icon">❓</div>
            <h3>知识问答</h3>
            <p>测试你的知识储备</p>
            <div class="play-btn">开始游戏</div>
        </div>
    </main>

    <footer>
        <p>基于HTML5技术的互动小游戏网站 - 毕业设计项目</p>
    </footer>
</body>
</html>
